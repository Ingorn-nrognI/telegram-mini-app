function initGame() {

  function fullResetMenu() {
    document.body.removeAttribute("style");

    const menu = document.getElementById("menu");
    if (menu) {
      menu.removeAttribute("style");
      menu.style.display = "flex";
      menu.classList.add("menu-reset");

      requestAnimationFrame(() => {
        menu.classList.remove("menu-reset");
      });
    }

    const gameCanvas = document.getElementById("game");
    if (gameCanvas) {
      gameCanvas.style.display = "none";
    }

    forceCloseEndGameUI();
    endGameShown = false;
    isClosingEndGame = false;
    endGameExitHandled = false;
    openEndGameForCurrentMatch = null;
    exitEndGameForCurrentMatch = null;
    closeRooms();
    setMenuView("mode");
    latestGameRoomState = null;
    loadGameHistory();
  }

  if (window.gameInitialized) return;
  window.gameInitialized = true;
  
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const roadLeft = 0.15;
  const roadRight = 0.85;
  const laneOffset = 0.2;

  canvas.width = canvas.clientWidth || window.innerWidth;
  canvas.height = canvas.clientHeight || window.innerHeight;

  const playerState = {
    position: 0,
    alive: true
  };

  const { id: playerId, name } = getCurrentPlayer();
  
  const beaver = new Image();
  const log = new Image();

  function loadImage(src, image) {
    return new Promise((resolve) => {
      image.onload = () => resolve(true);
      image.onerror = () => {
        console.log("Ошибка загрузки " + src);
        resolve(false);
      };
      image.src = src;
    });
  }

  let player = {
    x: canvas.width / 2 - 30,
    y: canvas.height - 150,
    width: 60,
    height: 60,
    dy: 0,
    gravity: 0.6,
    jump: -13,
    grounded: true,
    gameOver: false,
    gameOverText: "Ты врезался!"
  };

  const roadCenter = (roadLeft + roadRight) / 2;
  const lane1 = canvas.width * (roadCenter - laneOffset);
  const lane2 = canvas.width * roadCenter;
  const lane3 = canvas.width * (roadCenter + laneOffset);

  player.x = lane2 - player.width / 2;

  if (gameResizeHandler) {
    window.removeEventListener("resize", gameResizeHandler);
  }

  gameResizeHandler = () => {};
  window.addEventListener("resize", gameResizeHandler);

  let obstacles1 = [];
  let obstacles2 = [];
  let obstacles3 = [];
  let gameSpeed = 0.008;
  let lastTime = performance.now();
  let deltaTime = 1;
  let score = 0;
  let firstObstacleResolved = false;
  let gameStarted = false;
  let startTimer = 3;
  let showStartText = true;
  let latestGameRoomState = null;
  let simulationTick = 0;
  let lastTargetTick = 0;
  let lastCountdownSecond = null;

  let syncInterval = null;
  let winnerCheckInterval = null;

  if (currentRoomId) {
    const roomRef = db.collection("rooms").doc(currentRoomId);

    safeRoomUpdate(roomRef, {
      [`gameState.playersData.${playerId}.name`]: name,
      [`gameState.playersData.${playerId}.position`]: Math.round(playerState.position),
      [`gameState.playersData.${playerId}.alive`]: playerState.alive,
      [`gameState.playersData.${playerId}.score`]: score,
      [`gameState.playersData.${playerId}.firstObstacleResolved`]: firstObstacleResolved
    }, "initGame.initialPlayerState").catch(err => console.error("Ошибка начальной записи игрока:", err));

    let lastSyncedState = {
      position: null,
      alive: null,
      score: null,
      firstObstacleResolved: null
    };

    syncInterval = setInterval(() => {
      if (!currentRoomId) return;

      const roundedPosition = Math.round(playerState.position);
      const hasChanges =
        lastSyncedState.position !== roundedPosition ||
        lastSyncedState.alive !== playerState.alive ||
        lastSyncedState.score !== score ||
        lastSyncedState.firstObstacleResolved !== firstObstacleResolved;

      if (!hasChanges) return;

      lastSyncedState = {
        position: roundedPosition,
        alive: playerState.alive,
        score: score,
        firstObstacleResolved: firstObstacleResolved
      };

      safeRoomUpdate(roomRef, {
        [`gameState.playersData.${playerId}.position`]: roundedPosition,
        [`gameState.playersData.${playerId}.alive`]: playerState.alive,
        [`gameState.playersData.${playerId}.score`]: score,
        [`gameState.playersData.${playerId}.firstObstacleResolved`]: firstObstacleResolved,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, "initGame.syncPlayerState").catch(err => console.error("Ошибка обновления позиции:", err));
    }, 1500);

    // ИСПРАВЛЕНИЕ 3: Увеличен интервал с 2000 до 3000ms для снижения contention
    winnerCheckInterval = setInterval(() => {
      if (gameStarted && currentRoomId && !winnerProcessing) {
        checkWinner();
      }
    }, 3000);
  }

  if (gameBeforeUnloadHandler) {
    window.removeEventListener("beforeunload", gameBeforeUnloadHandler);
  }

  gameBeforeUnloadHandler = () => {
    if (syncInterval) clearInterval(syncInterval);
    if (winnerCheckInterval) clearInterval(winnerCheckInterval);
    stopRoomReadyPoll();
  };

  window.addEventListener("beforeunload", gameBeforeUnloadHandler);

  let isWatching1 = false;
  let isWatching2 = false;
  let isWatching3 = false;
  let playerLost = false;
  
  let frozenObstacle = null;
  
  let exitBtn = {x: 0, y: 0, w: 0, h: 0};
  let watchBtn = {x: 0, y: 0, w: 0, h: 0};

  let exitToMenuBtn = {x: 0, y: 0, w: 0, h: 0};
  let showExitButton = false;

  openEndGameForCurrentMatch = function(resultData) {
    if (suppressEndGameModal || isClosingEndGame || endGameExitHandled) return;

    player.gameOver = false;
    showExitButton = false;
    isWatching2 = true;
    frozenObstacle = null;

    showEndGameModal(resultData);
  };

  activeLeaveAfterLossHandler = leaveAfterLoss;

  exitEndGameForCurrentMatch = async function() {
    forceCloseEndGameUI();
    stopEndGameWatcher();
    endGameShown = false;
    isClosingEndGame = true;
    endGameExitHandled = true;
    openEndGameForCurrentMatch = null;
    exitEndGameForCurrentMatch = null;

    await leaveAfterLoss();
  };

  function spawnObstacle1() {
    if (!gameStarted) return;
    if (!isWatching1) {
      obstacles1.push({ x: lane1, z: 1 });
    }
  }

  function spawnObstacle2() {
    if (!gameStarted) return;
    if (!isWatching2) {
      obstacles2.push({ x: lane2, z: 1, passed: false });
    }
  }

  function spawnObstacle3() {
    if (!gameStarted) return;
    if (!isWatching3) {
      obstacles3.push({ x: lane3, z: 1 });
    }
  }

  async function prepareGameAssets() {
    await Promise.all([
      loadImage("beaver.png", beaver),
      loadImage("log.png", log)
    ]);
  }

  function jump() {
    console.log("jump called, grounded:", player.grounded, "gameOver:", player.gameOver, "gameStarted:", gameStarted);

    if (player.grounded && !player.gameOver && gameStarted) {
      player.dy = player.jump;
      player.grounded = false;
      console.log("jump executed!");
    }
  }

  if (gameCanvasClickHandler) {
    canvas.removeEventListener("click", gameCanvasClickHandler);
  }

  gameCanvasClickHandler = (e) => {
    console.log("click detected");
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (
      showExitButton &&
      x > exitToMenuBtn.x && x < exitToMenuBtn.x + exitToMenuBtn.w &&
      y > exitToMenuBtn.y && y < exitToMenuBtn.y + exitToMenuBtn.h
    ) {
      leaveAfterLoss();
      return;
    }

    console.log("click detected, player.gameOver:", player.gameOver, "gameStarted:", gameStarted);

    if (player.gameOver) {
      if (
        x > watchBtn.x && x < watchBtn.x + watchBtn.w &&
        y > watchBtn.y && y < watchBtn.y + watchBtn.h
      ) {
        isWatching2 = true;
        player.gameOver = false;
        player.dy = 0;
        player.grounded = true;

        if (player.frozenX !== undefined) {
          player.x = player.frozenX;
          player.y = player.frozenY;
        }

        showExitButton = true;
        return;
      }

      if (
        x > exitBtn.x && x < exitBtn.x + exitBtn.w &&
        y > exitBtn.y && y < exitBtn.y + exitBtn.h
      ) {
        leaveAfterLoss();
        return;
      }

      return;
    }

    jump();
  };

  canvas.addEventListener("click", gameCanvasClickHandler);

  if (gameCanvasTouchHandler) {
    canvas.removeEventListener("touchstart", gameCanvasTouchHandler);
  }

  gameCanvasTouchHandler = (e) => {
    e.preventDefault();

    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;

    if (
      showExitButton &&
      x > exitToMenuBtn.x && x < exitToMenuBtn.x + exitToMenuBtn.w &&
      y > exitToMenuBtn.y && y < exitToMenuBtn.y + exitToMenuBtn.h
    ) {
      leaveAfterLoss();
      return;
    }

    if (player.gameOver) {
      if (
        x > watchBtn.x && x < watchBtn.x + watchBtn.w &&
        y > watchBtn.y && y < watchBtn.y + watchBtn.h
      ) {
        isWatching2 = true;
        player.gameOver = false;
        player.dy = 0;
        player.grounded = true;

        if (player.frozenX !== undefined) {
          player.x = player.frozenX;
          player.y = player.frozenY;
        }

        showExitButton = true;
        return;
      }

      if (
        x > exitBtn.x && x < exitBtn.x + exitBtn.w &&
        y > exitBtn.y && y < exitBtn.y + exitBtn.h
      ) {
        leaveAfterLoss();
        return;
      }

      return;
    }

    jump();
  };

  canvas.addEventListener("touchstart", gameCanvasTouchHandler);
  
  function updatePlayer() {
    if (!player.gameOver && gameStarted) {
      player.dy += player.gravity * deltaTime;
      player.y += player.dy * deltaTime;
    }
    
    if (player.y >= canvas.height - 150) {
      player.y = canvas.height - 150;
      player.dy = 0;
      player.grounded = true;
    }

    playerState.position = player.y;
    playerState.alive = !playerLost;
  }


  function updateObstacles1() {
    if (!isWatching1 && gameStarted) {
      obstacles1.forEach(o => {
        o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
      });
      obstacles1 = obstacles1.filter(o => o.z > 0);
    }
  }

  function updateObstacles2() {
    if (!isWatching2 && gameStarted) {
      obstacles2.forEach(o => {
        o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
      });
      obstacles2 = obstacles2.filter(o => o.z > 0);
    }
  }

  function updateObstacles3() {
    if (!isWatching3 && gameStarted) {
      obstacles3.forEach(o => {
        o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
      });
      obstacles3 = obstacles3.filter(o => o.z > 0);
    }
  }

  function drawRoad() {
    ctx.fillStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(canvas.width * roadLeft, canvas.height);
    ctx.lineTo(canvas.width * roadRight, canvas.height);
    ctx.lineTo(canvas.width * (roadRight - 0.2), 0);
    ctx.lineTo(canvas.width * (roadLeft + 0.2), 0);
    ctx.closePath();
    ctx.fill();
  }

  function drawObstacles1() {
    obstacles1.forEach(o => {
      let scale = 1 - o.z;
      let size = 60 * scale;
      let x = canvas.width / 2 + (lane1 - canvas.width / 2) * scale - size/2;
      let y = 100 + (canvas.height - 200) * scale;

      ctx.drawImage(log, x, y, size, size);

      if (!player.gameOver && scale > 0.85 &&
          player.x < x + size && player.x + player.width > x &&
          player.y < y + size && player.y + player.height > y) {
        player.gameOver = true;
      }
    });
  }

  function drawObstacles2() {
    if (frozenObstacle) {
      ctx.drawImage(log, frozenObstacle.x, frozenObstacle.y, frozenObstacle.size, frozenObstacle.size);
    }

    if (!player.gameOver && !isWatching2) {
      for (let i = 0; i < obstacles2.length; i++) {
        let o = obstacles2[i];
        let scale = 1 - o.z;
        let size = 60 * scale;
        let x = canvas.width / 2 + (lane2 - canvas.width / 2) * scale - size/2;
        let y = 100 + (canvas.height - 200) * scale;

        ctx.drawImage(log, x, y, size, size);

        if (scale > 0.85 &&
            player.x < x + size && player.x + player.width > x &&
            player.y < y + size && player.y + player.height > y) {

          frozenObstacle = { x: x, y: y, size: size };
          player.frozenX = player.x;
          player.frozenY = player.y;
          obstacles2 = [];
          player.gameOverText = "Ты врезался! Счёт: " + score;

          saveBestScore(score);

          player.gameOver = true;
          playerLost = true;
          playerState.alive = false;
          firstObstacleResolved = true;

          (async () => {
            await markPlayerAsLost();
            await markPendingDuelFinish();
          })();

          return;
        }

        if (!o.passed && o.z < 0.05 && !player.gameOver) {
          o.passed = true;

          if (!firstObstacleResolved) {
            firstObstacleResolved = true;
          }

          if (!player.grounded) {
            score++;

            if (currentRoomId) {
              const roomRef = db.collection("rooms").doc(currentRoomId);

              roomRef.get().then(async (doc) => {
                if (!doc.exists) return;

                const room = doc.data();
                let finalScore = score;

                const duelResolved = await resolvePendingDuelFinishIfNeeded(roomRef, finalScore);
                if (duelResolved) {
                  return;
                }

                await safeRoomUpdate(roomRef, {
                  updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                  [`gameState.playersData.${playerId}.score`]: finalScore,
                  [`gameState.playersData.${playerId}.firstObstacleResolved`]: true
                }, "drawObstacles2.scoreUpdate");
              }).catch(err => console.error("Ошибка обновления счёта:", err));
            }
          }
        }
      }
    }
  }

  function drawObstacles3() {
    obstacles3.forEach(o => {
      let scale = 1 - o.z;
      let size = 60 * scale;
      let x = canvas.width / 2 + (lane3 - canvas.width / 2) * scale - size/2;
      let y = 100 + (canvas.height - 200) * scale;

      ctx.drawImage(log, x, y, size, size);

      if (!player.gameOver && scale > 0.85 &&
          player.x < x + size && player.x + player.width > x &&
          player.y < y + size && player.y + player.height > y) {
        player.gameOver = true;
      }
    });
  }

  function drawPlayer() {
    if (frozenObstacle && isWatching2) {
      ctx.drawImage(beaver, player.frozenX || player.x, player.frozenY || player.y, player.width, player.height);
    } else {
      ctx.drawImage(beaver, player.x, player.y, player.width, player.height);
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  function drawExitButton() {
    if (!showExitButton) return;
    
    const btnWidth = 100;
    const btnHeight = 45;
    const padding = 20;
    
    const btnX = canvas.width - btnWidth - padding;
    const btnY = canvas.height - btnHeight - padding;
    
    exitToMenuBtn = { x: btnX, y: btnY, w: btnWidth, h: btnHeight };
    
    ctx.fillStyle = "#dc3545";
    ctx.beginPath();
    ctx.moveTo(btnX + 10, btnY);
    ctx.lineTo(btnX + btnWidth - 10, btnY);
    ctx.quadraticCurveTo(btnX + btnWidth, btnY, btnX + btnWidth, btnY + 10);
    ctx.lineTo(btnX + btnWidth, btnY + btnHeight - 10);
    ctx.quadraticCurveTo(btnX + btnWidth, btnY + btnHeight, btnX + btnWidth - 10, btnY + btnHeight);
    ctx.lineTo(btnX + 10, btnY + btnHeight);
    ctx.quadraticCurveTo(btnX, btnY + btnHeight, btnX, btnY + btnHeight - 10);
    ctx.lineTo(btnX, btnY + 10);
    ctx.quadraticCurveTo(btnX, btnY, btnX + 10, btnY);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Выйти", btnX + btnWidth/2, btnY + btnHeight/2 + 5);
  }

  function drawGameOver() {
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const boxWidth = 300;
    const boxHeight = 180;
    const boxX = canvas.width / 2 - boxWidth / 2;
    const boxY = canvas.height / 2 - boxHeight / 2;

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    roundRect(ctx, boxX, boxY, boxWidth, boxHeight, 25);

    ctx.fillStyle = "#fff";
    ctx.font = "22px Arial";
    ctx.textAlign = "center";
    ctx.fillText(player.gameOverText, canvas.width/2, boxY + 50);

    const btnWidth = 110;
    const btnHeight = 40;

    const watchX = boxX + 20;
    const watchY = boxY + 100;
    watchBtn = { x: watchX, y: watchY, w: btnWidth, h: btnHeight };

    ctx.fillStyle = "#28a745";
    roundRect(ctx, watchX, watchY, btnWidth, btnHeight, 15);
    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText("Смотреть", watchX + btnWidth/2, watchY + 25);

    const exitX = boxX + boxWidth - btnWidth - 20;
    const exitY = watchY;
    exitBtn = { x: exitX, y: exitY, w: btnWidth, h: btnHeight };

    ctx.fillStyle = "#dc3545";
    roundRect(ctx, exitX, exitY, btnWidth, btnHeight, 15);
    ctx.fillStyle = "#fff";
    ctx.fillText("Выйти", exitX + btnWidth/2, exitY + 25);
  }

  function drawStartTimer() {
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";

    if (!syncedCountdownStartedAtMs) {
      const playerIds = Array.isArray(latestGameRoomState?.playerIds)
        ? latestGameRoomState.playerIds.filter(Boolean)
        : [];
      const playersReady = latestGameRoomState?.gameState?.playersReady || {};
      const readyCount = playerIds.filter(pid => playersReady[pid] === true).length;
      const totalCount = playerIds.length || 1;

      ctx.font = "bold 34px Arial";
      ctx.fillText("Загрузка игры...", canvas.width / 2, canvas.height / 2 - 16);

      ctx.font = "24px Arial";
      ctx.fillText(`Готово игроков: ${readyCount}/${totalCount}`, canvas.width / 2, canvas.height / 2 + 26);
      return;
    }

    if (startTimer > 0) {
      ctx.font = "bold 80px Arial";
      ctx.fillText(startTimer, canvas.width / 2, canvas.height / 2);
    } else if (showStartText) {
      ctx.font = "bold 60px Arial";
      ctx.fillText("START", canvas.width / 2, canvas.height / 2);
    }
  }

  async function markPlayerAsLost() {
    if (!currentRoomId) return;

    const roomRef = db.collection("rooms").doc(currentRoomId);

    try {
      await safeRoomUpdate(roomRef, {
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        [`gameState.playersData.${playerId}.name`]: name,
        [`gameState.playersData.${playerId}.alive`]: false,
        [`gameState.playersData.${playerId}.lost`]: true,
        [`gameState.playersData.${playerId}.score`]: score,
        [`gameState.playersData.${playerId}.lostAt`]: Date.now()
      }, "markPlayerAsLost");
    } catch (e) {
      console.error("Ошибка отметки поражения:", e);
    }
  }

  async function markPendingDuelFinish() {
    if (!currentRoomId) return;

    const roomRef = db.collection("rooms").doc(currentRoomId);

    try {
      const doc = await roomRef.get();
      if (!doc.exists) return;

      const room = doc.data();
      const playersData = room?.gameState?.playersData || {};

      const alivePlayers = Object.entries(playersData).filter(([_, p]) => {
        return p && p.alive === true && p.leftRoom !== true;
      });

      const loserPlayers = Object.entries(playersData).filter(([_, p]) => {
        return p && p.lost === true && p.leftRoom !== true;
      });

      if (alivePlayers.length === 1 && loserPlayers.length === 1) {
        const winnerId = alivePlayers[0][0];
        const loserId = loserPlayers[0][0];
        const loserScore = Number(loserPlayers[0][1]?.score || 0);

        await safeRoomUpdate(roomRef, {
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.pendingFinish": {
            active: true,
            winnerId,
            loserId,
            loserScore,
            resolved: false
          }
        }, "markPendingDuelFinish");
      }
    } catch (e) {
      console.error("Ошибка markPendingDuelFinish:", e);
    }
  }

  async function resolvePendingDuelFinishIfNeeded(roomRef, fallbackFinalScore) {
    if (!roomRef || !currentRoomId) return false;

    let resolved = false;
    let resolvedResultData = null;
    let resolvedScore = Number(fallbackFinalScore || 0);

    try {
      await runRoomTransaction(roomRef, async (transaction) => {
        const roomDoc = await transaction.get(roomRef);
        if (!roomDoc.exists) return;

        const room = roomDoc.data();
        if (!room?.gameState?.playersData) return;
        if (room.gameState.finished === true || room.status === "finished") return;

        const playersData = room.gameState.playersData || {};
        const pendingFinish = room.gameState.pendingFinish || null;

        const alivePlayers = Object.entries(playersData).filter(([_, p]) => {
          return p && p.alive === true && p.leftRoom !== true;
        });

        const loserPlayers = Object.entries(playersData).filter(([_, p]) => {
          return p && p.lost === true && p.leftRoom !== true;
        });

        const canResolveExistingPending =
          pendingFinish?.active === true &&
          pendingFinish.winnerId === playerId &&
          pendingFinish.resolved !== true;

        const isFallbackDuelState =
          alivePlayers.length === 1 &&
          loserPlayers.length === 1 &&
          alivePlayers[0][0] === playerId;

        if (!canResolveExistingPending && !isFallbackDuelState) {
          return;
        }

        const loserEntry = canResolveExistingPending
          ? loserPlayers.find(([pid]) => pid === pendingFinish.loserId) || loserPlayers[0]
          : loserPlayers[0];

        const loserId = loserEntry?.[0] || (canResolveExistingPending ? pendingFinish.loserId : null);
        const loserData = loserEntry?.[1] || {};
        const loserScore = canResolveExistingPending
          ? Number(pendingFinish.loserScore || loserData.score || 0)
          : Number(loserData.score || 0);

        const winnerData = playersData[playerId] || {};
        const winnerName = winnerData.name || room.playerNames?.[playerId] || name;
        const loserName = loserData.name || room.playerNames?.[loserId] || "Игрок";

        const finalScore = Math.max(Number(fallbackFinalScore || 0), loserScore + 1);
        resolvedScore = finalScore;
        score = finalScore;

        const finalResults = [
          {
            place: 1,
            name: winnerName,
            score: finalScore
          },
          {
            place: 2,
            name: loserName,
            score: loserScore
          }
        ];

        transaction.update(roomRef, {
          status: "finished",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.finished": true,
          "gameState.started": false,
          "gameState.winner": winnerName,
          "gameState.results": finalResults,
          [`gameState.playersData.${playerId}.score`]: finalScore,
          [`gameState.playersData.${playerId}.firstObstacleResolved`]: true,
          "gameState.pendingFinish": {
            active: true,
            winnerId: playerId,
            loserId,
            loserScore,
            resolved: true,
            resolvedAt: Date.now(),
            finalWinnerScore: finalScore
          }
        });

        resolved = true;
        resolvedResultData = {
          winner: winnerName,
          results: finalResults
        };
      }, "resolvePendingDuelFinishIfNeeded");
    } catch (e) {
      console.error("Ошибка resolvePendingDuelFinishIfNeeded:", e);
      return false;
    }

    if (!resolved) {
      return false;
    }

    winnerProcessing = true;
    await saveBestScore(resolvedScore);

    if (resolvedResultData && !endGameShown) {
      try {
        const finishedDoc = await roomRef.get();
        if (finishedDoc.exists) {
          await ensureCurrentMatchHistorySaved(currentRoomId, finishedDoc.data());
        }
      } catch (e) {
        console.error("Ошибка финального сохранения истории:", e);
      }

      showEndGameModal(resolvedResultData);
    }

    return true;
  }


  function buildDrawResultIfNeeded(allLosersSorted, roomData, pendingFinish) {
    if (!Array.isArray(allLosersSorted) || allLosersSorted.length < 2) {
      return null;
    }

    const first = allLosersSorted[0];
    const second = allLosersSorted[1];

    if (!first || !second) return null;

    const firstScore = Number(first[1]?.score || 0);
    const secondScore = Number(second[1]?.score || 0);
    const firstLostAt = Number(first[1]?.lostAt || 0);
    const secondLostAt = Number(second[1]?.lostAt || 0);
    const lostAtDiffMs = Math.abs(firstLostAt - secondLostAt);
    const isSimultaneousCrash = firstLostAt > 0 && secondLostAt > 0 && lostAtDiffMs <= 1200;

    if (firstScore !== secondScore) {
      return null;
    }

    if (pendingFinish?.finalWinnerScore != null && !isSimultaneousCrash) {
      return null;
    }

    const results = [
      {
        place: 1,
        name: first[1]?.name || roomData.playerNames?.[first[0]] || "Игрок",
        score: firstScore
      },
      {
        place: 1,
        name: second[1]?.name || roomData.playerNames?.[second[0]] || "Игрок",
        score: secondScore
      }
    ];

    if (allLosersSorted[2]) {
      results.push({
        place: 3,
        name: allLosersSorted[2][1]?.name || roomData.playerNames?.[allLosersSorted[2][0]] || "Игрок",
        score: Number(allLosersSorted[2][1]?.score || 0)
      });
    }

    return {
      winnerLabel: "Ничья",
      results
    };
  }
  
  async function leaveAfterLoss() {
    activeLeaveAfterLossHandler = leaveAfterLoss;
    suppressEndGameModal = true;
    endGameExitHandled = true;
    isClosingEndGame = true;
    hardCloseEndGameModal();
    stopRoomReadyPoll();
    hardCloseEndGameModal();
    stopEndGameWatcher();
    endGameShown = false;

    const exitingRoomId = currentRoomId;
    const exitingPlayerId = playerId;

    currentRoomId = null;
    resetServerClockSync();

    if (currentRoomListener) {
      currentRoomListener();
      currentRoomListener = null;
    }

    stopRoomCountdown();
    stopRoomPresence();
    stopGameCountdownStartListener();
    multiplayerGameStarted = false;
    resetSpawnState();

    if (syncInterval) clearInterval(syncInterval);
    if (winnerCheckInterval) clearInterval(winnerCheckInterval);

    window.gameInitialized = false;
    suppressEndGameModal = false;
    activeLeaveAfterLossHandler = null;
    showExitButton = false;
    forceCloseEndGameUI();
    endGameShown = false;
    isClosingEndGame = false;
    endGameExitHandled = false;
    openEndGameForCurrentMatch = null;
    exitEndGameForCurrentMatch = null;

    if (gameResizeHandler) {
      window.removeEventListener("resize", gameResizeHandler);
      gameResizeHandler = null;
    }

    if (gameBeforeUnloadHandler) {
      window.removeEventListener("beforeunload", gameBeforeUnloadHandler);
      gameBeforeUnloadHandler = null;
    }

    if (gameCanvasClickHandler) {
      canvas.removeEventListener("click", gameCanvasClickHandler);
      gameCanvasClickHandler = null;
    }

    if (gameCanvasTouchHandler) {
      canvas.removeEventListener("touchstart", gameCanvasTouchHandler);
      gameCanvasTouchHandler = null;
    }

    fullResetMenu();
    document.getElementById("createRoomBtn").style.display = "block";
    loadRooms();

    if (!exitingRoomId) {
      return;
    }

    (async () => {
      const roomRef = db.collection("rooms").doc(exitingRoomId);

      try {
        const doc = await roomRef.get();
        if (!doc.exists) return;

        const room = doc.data();
        const newPlayers = Array.isArray(room.playerIds)
          ? room.playerIds.filter(pid => pid !== exitingPlayerId)
          : [];

        if (newPlayers.length === 0) {
          await roomRef.delete();
          return;
        }

        const newPlayerNames = { ...(room.playerNames || {}) };
        delete newPlayerNames[exitingPlayerId];

        const updateData = {
          playerIds: newPlayers,
          playerNames: newPlayerNames,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          [`gameState.playersData.${exitingPlayerId}.leftRoom`]: true,
          [`gameState.playersReady.${exitingPlayerId}`]: firebase.firestore.FieldValue.delete()
        };

        if (newPlayers.length < 2) {
          updateData.startAt = null;
        }

        await safeRoomUpdate(roomRef, updateData, "leaveAfterLoss");
      } catch (e) {
        console.error("Ошибка выхода после поражения:", e);
      }
    })();
  }

  // ИСПРАВЛЕНИЕ 4: checkWinner использует safeFinishRoom для атомарных записей
  async function checkWinner() {
    if (!currentRoomId || winnerProcessing) return;

    const roomRef = db.collection("rooms").doc(currentRoomId);

    try {
      const roomDoc = await roomRef.get();
      if (!roomDoc.exists) return;

      const roomData = roomDoc.data();
      if (!roomData?.gameState?.playersData) return;
      if (roomData.gameState.finished) return;

      const playersData = roomData.gameState.playersData;
      const pendingFinish = roomData.gameState.pendingFinish || null;

      const alivePlayers = Object.entries(playersData).filter(([_, p]) => {
        return p && p.alive === true && p.leftRoom !== true;
      });

      const allLosersSorted = Object.entries(playersData)
        .filter(([_, p]) => p && p.lost === true && p.leftRoom !== true)
        .sort((a, b) => Number(b[1].lostAt || 0) - Number(a[1].lostAt || 0));

      // =========================
      // ВАРИАНТ 1: остался 1 живой
      // =========================
      if (alivePlayers.length === 1) {
        const winnerId = alivePlayers[0][0];
        const winnerData = playersData[winnerId] || {};
        const winnerName = winnerData.name || roomData.playerNames?.[winnerId] || "Игрок";

        const loserEntries = allLosersSorted.filter(([pid]) => pid !== winnerId);

        if (
          pendingFinish &&
          pendingFinish.active === true &&
          pendingFinish.winnerId === winnerId
        ) {
          if (pendingFinish.resolved !== true) {
            return;
          }
        }

        // Устанавливаем флаг ДО асинхронных операций
        winnerProcessing = true;

        const winnerScore =
          pendingFinish?.finalWinnerScore != null
            ? Number(pendingFinish.finalWinnerScore)
            : (winnerId === playerId ? score : Number(winnerData.score || 0));

        if (winnerId === playerId) {
          await saveBestScore(winnerScore);
        }

        const finalResults = [
          {
            place: 1,
            name: winnerName,
            score: winnerScore
          }
        ];

        if (loserEntries[0]) {
          finalResults.push({
            place: 2,
            name: loserEntries[0][1].name || roomData.playerNames?.[loserEntries[0][0]] || "Игрок",
            score: Number(loserEntries[0][1].score || 0)
          });
        }

        if (loserEntries[1]) {
          finalResults.push({
            place: 3,
            name: loserEntries[1][1].name || roomData.playerNames?.[loserEntries[1][0]] || "Игрок",
            score: Number(loserEntries[1][1].score || 0)
          });
        }

        // ИСПРАВЛЕНИЕ: Используем safeFinishRoom вместо прямого roomRef.update
        const wrote = await safeFinishRoom(roomRef, {
          status: "finished",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.finished": true,
          "gameState.started": false,
          "gameState.winner": winnerName,
          "gameState.results": finalResults,
          "gameState.pendingFinish": firebase.firestore.FieldValue.delete(),
          [`gameState.playersData.${winnerId}.score`]: winnerScore
        }, "checkWinner.winner1alive");

        if (wrote === false) {
          // Уже завершено другим клиентом — просто читаем финальные данные
          const freshDoc = await roomRef.get();
          if (freshDoc.exists) {
            const freshRoom = freshDoc.data();
            if (freshRoom?.gameState?.finished && freshRoom?.gameState?.winner) {
              showEndGameModal({
                winner: freshRoom.gameState.winner,
                results: freshRoom.gameState.results
              });
            }
          }
          return;
        }

        await ensureCurrentMatchHistorySaved(currentRoomId, {
          ...roomData,
          status: "finished",
          gameState: {
            ...(roomData.gameState || {}),
            finished: true,
            winner: winnerName,
            results: finalResults
          }
        });

        showEndGameModal({
          winner: winnerName,
          results: finalResults
        });

        return;
      }

      // =========================
      // ВАРИАНТ 2: живых не осталось
      // =========================
      if (alivePlayers.length === 0 && allLosersSorted.length > 0) {
        winnerProcessing = true;

        const drawResult = buildDrawResultIfNeeded(allLosersSorted, roomData, pendingFinish);

        if (drawResult) {
          for (const item of drawResult.results) {
            if (item.name === name) {
              await saveBestScore(item.score);
            }
          }

          // ИСПРАВЛЕНИЕ: Используем safeFinishRoom
          const wrote = await safeFinishRoom(roomRef, {
            status: "finished",
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            "gameState.finished": true,
            "gameState.started": false,
            "gameState.winner": drawResult.winnerLabel,
            "gameState.results": drawResult.results,
            "gameState.pendingFinish": firebase.firestore.FieldValue.delete()
          }, "checkWinner.draw");

          if (wrote === false) {
            const freshDoc = await roomRef.get();
            if (freshDoc.exists) {
              const freshRoom = freshDoc.data();
              if (freshRoom?.gameState?.finished && freshRoom?.gameState?.winner) {
                showEndGameModal({
                  winner: freshRoom.gameState.winner,
                  results: freshRoom.gameState.results
                });
              }
            }
            return;
          }

          await ensureCurrentMatchHistorySaved(currentRoomId, {
            ...roomData,
            status: "finished",
            gameState: {
              ...(roomData.gameState || {}),
              finished: true,
              winner: drawResult.winnerLabel,
              results: drawResult.results
            }
          });

          showEndGameModal({
            winner: drawResult.winnerLabel,
            results: drawResult.results
          });

          return;
        }

        const winnerId = allLosersSorted[0][0];
        const winnerData = allLosersSorted[0][1] || {};
        const winnerName = winnerData.name || roomData.playerNames?.[winnerId] || "Игрок";

        const otherLosers = allLosersSorted.slice(1);
        const winnerScore = Number(winnerData.score || 0);

        if (winnerId === playerId) {
          await saveBestScore(winnerScore);
        }

        const finalResults = [
          {
            place: 1,
            name: winnerName,
            score: winnerScore
          }
        ];

        if (otherLosers[0]) {
          finalResults.push({
            place: 2,
            name: otherLosers[0][1].name || roomData.playerNames?.[otherLosers[0][0]] || "Игрок",
            score: Number(otherLosers[0][1].score || 0)
          });
        }

        if (otherLosers[1]) {
          finalResults.push({
            place: 3,
            name: otherLosers[1][1].name || roomData.playerNames?.[otherLosers[1][0]] || "Игрок",
            score: Number(otherLosers[1][1].score || 0)
          });
        }

        // ИСПРАВЛЕНИЕ: Используем safeFinishRoom
        const wrote = await safeFinishRoom(roomRef, {
          status: "finished",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.finished": true,
          "gameState.started": false,
          "gameState.winner": winnerName,
          "gameState.results": finalResults,
          "gameState.pendingFinish": firebase.firestore.FieldValue.delete(),
          [`gameState.playersData.${winnerId}.score`]: winnerScore
        }, "checkWinner.allLost");

        if (wrote === false) {
          const freshDoc = await roomRef.get();
          if (freshDoc.exists) {
            const freshRoom = freshDoc.data();
            if (freshRoom?.gameState?.finished && freshRoom?.gameState?.winner) {
              showEndGameModal({
                winner: freshRoom.gameState.winner,
                results: freshRoom.gameState.results
              });
            }
          }
          return;
        }

        await ensureCurrentMatchHistorySaved(currentRoomId, {
          ...roomData,
          status: "finished",
          gameState: {
            ...(roomData.gameState || {}),
            finished: true,
            winner: winnerName,
            results: finalResults
          }
        });

        showEndGameModal({
          winner: winnerName,
          results: finalResults
        });
      }
    } catch (e) {
      console.error("Ошибка checkWinner:", e);
      winnerProcessing = false;
    }
  }

  function loop(currentTime) {
    deltaTime = (currentTime - lastTime) / 16.67;
    deltaTime = Math.min(2, Math.max(0.5, deltaTime));

    lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawRoad();
    updatePlayer();
    updateObstacles1();
    updateObstacles2();
    updateObstacles3();
    drawObstacles1();
    drawObstacles2();
    drawObstacles3();
    drawPlayer();

    if (!gameStarted) {
      drawStartTimer();
    }

    ctx.fillStyle = "#fff";
    ctx.font = "20px Arial";
    ctx.textAlign = "left";
    ctx.fillText("Score: " + score, 20, 40);
    
    if (player.gameOver && !endGameShown) {
      drawGameOver();
    }

    if (!endGameShown) {
      drawExitButton();
    }
    
    if (gameStarted) {
      gameSpeed += 0.00001 * deltaTime;
    }

    requestAnimationFrame(loop);
  }

  
  let syncedCountdownStartedAtMs = null;
  let spawnStarted = false;
  let spawnAccumulator1 = 0;
  let spawnAccumulator2 = 0;
  let spawnAccumulator3 = 0;
  const FIXED_STEP_MS = 1000 / 120;
  const LANE1_SPAWN_MS = 1200;
  const LANE2_SPAWN_MS = 1500;
  const LANE3_SPAWN_MS = 1800;

  function resetSpawnState() {
    spawnStarted = false;
    spawnAccumulator1 = 0;
    spawnAccumulator2 = 0;
    spawnAccumulator3 = 0;
  }

  function startSpawnIfNeeded() {
    if (spawnStarted) return;
    spawnStarted = true;

    spawnAccumulator1 = 0;
    spawnAccumulator2 = 0;
    spawnAccumulator3 = 0;

    spawnObstacle1();
    spawnObstacle2();
    spawnObstacle3();
  }

  function stepSimulation() {
    deltaTime = FIXED_STEP_MS / 16.67;

    updatePlayer();
    updateObstacles1();
    updateObstacles2();
    updateObstacles3();

    if (gameStarted) {
      gameSpeed += 0.00001;

      if (!isWatching1) {
        spawnAccumulator1 += FIXED_STEP_MS;
        while (spawnAccumulator1 >= LANE1_SPAWN_MS) {
          spawnAccumulator1 -= LANE1_SPAWN_MS;
          spawnObstacle1();
        }
      }

      if (!isWatching2) {
        spawnAccumulator2 += FIXED_STEP_MS;
        while (spawnAccumulator2 >= LANE2_SPAWN_MS) {
          spawnAccumulator2 -= LANE2_SPAWN_MS;
          spawnObstacle2();
        }
      }

      if (!isWatching3) {
        spawnAccumulator3 += FIXED_STEP_MS;
        while (spawnAccumulator3 >= LANE3_SPAWN_MS) {
          spawnAccumulator3 -= LANE3_SPAWN_MS;
          spawnObstacle3();
        }
      }
    }
  }

  async function startGameFlow() {
    syncedCountdownStartedAtMs = null;
    startTimer = 3;
    showStartText = true;
    gameStarted = false;
    simulationTick = 0;
    lastTargetTick = 0;
    lastCountdownSecond = null;
    resetSpawnState();

    lastTime = performance.now();
    requestAnimationFrame(loop);

    try {
      await prepareGameAssets();
    } catch (e) {
      console.error("Ошибка загрузки ассетов:", e);
    }

    await markPlayerReadyForGame(currentRoomId);

    stopRoomReadyPoll();
    stopGameCountdownStartListener();

    const roomRef = db.collection("rooms").doc(currentRoomId);

    gameCountdownStartListener = roomRef.onSnapshot(async (doc) => {
      if (!doc.exists || !currentRoomId) return;

      try {
        const room = doc.data();
        if (!room) return;

        latestGameRoomState = room;
        syncServerClockFromRoom(room);

        const countdownStartedAt = getRoomTimeMs(room.gameState?.countdownStartedAt);

        if (!countdownStartedAt) {
          await tryStartSyncedCountdown(currentRoomId);
          return;
        }

        syncedCountdownStartedAtMs = countdownStartedAt;
        stopRoomReadyPoll();
        stopGameCountdownStartListener();
      } catch (e) {
        console.error("Ошибка gameCountdownStartListener:", e);
      }
    });

    roomReadyPollInterval = setInterval(async () => {
      if (!currentRoomId || syncedCountdownStartedAtMs) return;

      try {
        const doc = await roomRef.get();
        if (!doc.exists) return;

        const room = doc.data();
        if (!room) return;

        latestGameRoomState = room;
        syncServerClockFromRoom(room);

        const countdownStartedAt = getRoomTimeMs(room.gameState?.countdownStartedAt);

        if (!countdownStartedAt) {
          await tryStartSyncedCountdown(currentRoomId);
          return;
        }

        syncedCountdownStartedAtMs = countdownStartedAt;
        stopRoomReadyPoll();
        stopGameCountdownStartListener();
      } catch (e) {
        console.error("Ошибка roomReadyPoll:", e);
      }
    }, 250);
  }

  loop = function(currentTime) {
    const frameDeltaMs = Math.min(32, Math.max(0, currentTime - lastTime));
    lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (syncedCountdownStartedAtMs) {
      const nowMs = getSyncedServerNowMs();
      const countdownElapsedMs = nowMs - (syncedCountdownStartedAtMs + GAME_READY_BUFFER_MS);

      if (countdownElapsedMs < 0) {
        startTimer = 3;
        showStartText = true;
        gameStarted = false;
      } else if (countdownElapsedMs < 3000) {
        const currentSecond = Math.max(0, 3 - Math.floor(countdownElapsedMs / 1000));
        if (lastCountdownSecond !== currentSecond) {
          lastCountdownSecond = currentSecond;
        }

        startTimer = currentSecond;
        showStartText = true;
        gameStarted = false;
      } else {
        if (!gameStarted) {
          frozenObstacle = null;
          obstacles1 = [];
          obstacles2 = [];
          obstacles3 = [];
          gameStarted = true;
          showStartText = false;
          simulationTick = 0;
          lastTargetTick = 0;
          resetSpawnState();
          startSpawnIfNeeded();
        }

        const gameElapsedMs = nowMs - (syncedCountdownStartedAtMs + GAME_READY_BUFFER_MS + 3000);
        const targetTick = Math.max(0, Math.floor(gameElapsedMs / FIXED_STEP_MS));
        let ticksToSimulate = Math.max(0, targetTick - lastTargetTick);

        if (ticksToSimulate > 0) {
          const hardCap = Math.max(1, Math.ceil(frameDeltaMs / FIXED_STEP_MS) + 8);
          ticksToSimulate = Math.min(ticksToSimulate, hardCap);
        }

        for (let i = 0; i < ticksToSimulate; i++) {
          simulationTick++;
          stepSimulation();
        }

        lastTargetTick += ticksToSimulate;
      }
    }

    drawRoad();
    drawObstacles1();
    drawObstacles2();
    drawObstacles3();
    drawPlayer();

    if (!gameStarted) {
      drawStartTimer();
    }

    ctx.fillStyle = "#fff";
    ctx.font = "20px Arial";
    ctx.textAlign = "left";
    ctx.fillText("Score: " + score, 20, 40);

    if (player.gameOver && !endGameShown) {
      drawGameOver();
    }

    if (!endGameShown) {
      drawExitButton();
    }

    requestAnimationFrame(loop);
  };

  startGameFlow();
}
